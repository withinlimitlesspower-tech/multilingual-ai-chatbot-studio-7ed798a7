<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F46E5" />
            <stop offset="50%" stop-color="#7C3AED" />
            <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.15)" />
        </filter>
    </defs>
    
    <!-- Background circle -->
    <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" filter="url(#shadow)" />
    
    <!-- Main AI/chat symbol -->
    <g transform="translate(50, 50)">
        <!-- Brain/neural network inspired shape -->
        <path d="M50,50 C70,30 90,40 100,50 C110,40 130,30 150,50 C130,70 110,80 100,70 C90,80 70,70 50,50 Z" 
              fill="white" fill-opacity="0.9" />
        
        <!-- Chat bubble integrated with brain -->
        <path d="M30,30 Q50,20 70,30 L70,60 Q50,70 30,60 Z" 
              fill="white" fill-opacity="0.8" transform="translate(25, 25)" />
        
        <!-- Code brackets representing programming -->
        <g transform="translate(35, 65)" fill="#4F46E5">
            <rect x="0" y="0" width="8" height="20" rx="2" />
            <rect x="52" y="0" width="8" height="20" rx="2" />
            <rect x="15" y="5" width="6" height="10" rx="1" />
            <rect x="39" y="5" width="6" height="10" rx="1" />
        </g>
        
        <!-- Multimedia symbols (video/audio) -->
        <g transform="translate(85, 65)">
            <!-- Play button for video -->
            <path d="M0,0 L0,20 L15,10 Z" fill="#7C3AED" />
            <!-- Sound waves for audio -->
            <g transform="translate(25, 0)">
                <path d="M0,20 L0,0 M5,15 L5,5 M10,20 L10,0" 
                      stroke="#EC4899" stroke-width="2" stroke-linecap="round" />
            </g>
        </g>
        
        <!-- Globe/multilingual representation -->
        <circle cx="50" cy="25" r="12" stroke="white" stroke-width="2" fill="none" />
        <path d="M50,13 L50,37 M38,25 L62,25" stroke="white" stroke-width="2" />
        <circle cx="50" cy="25" r="8" stroke="white" stroke-width="1" fill="none" />
        
        <!-- Connecting dots representing integration -->
        <circle cx="20" cy="45" r="3" fill="white" />
        <circle cx="80" cy="45" r="3" fill="white" />
        <circle cx="50" cy="85" r="3" fill="white" />
    </g>
    
    <!-- App name text -->
    <text x="100" y="170" text-anchor="middle" fill="#1F2937" font-family="Arial, sans-serif" 
          font-size="18" font-weight="bold" letter-spacing="1">
        OmniChat AI
    </text>
    
    <!-- Subtle tagline -->
    <text x="100" y="190" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" 
          font-size="10" font-weight="normal">
        Code • Media • Voice
    </text>
</svg>